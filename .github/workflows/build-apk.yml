name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init & add Android platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Add network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">generativelanguage.googleapis.com</domain>
              <domain includeSubdomains="true">googleapis.com</domain>
            </domain-config>
          </network-security-config>
          EOF

      - name: Patch AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "INTERNET" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          fi
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"|' $MANIFEST

      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MCQ-Exam-Simulator
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
