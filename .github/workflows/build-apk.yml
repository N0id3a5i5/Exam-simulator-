name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install pdfjs-dist, Capacitor core and SQLite plugin
        run: npm install pdfjs-dist @capacitor/core @capacitor-community/sqlite@^6.0.0 --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write capacitor.config.json with CapacitorHttp enabled
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.mcqexam.app",
            "appName": "MCQ Exam Simulator",
            "webDir": "dist",
            "plugins": {
              "CapacitorHttp": {
                "enabled": true
              }
            },
            "android": {
              "allowMixedContent": true
            }
          }
          EOF
      - name: Register SQLite plugin in MainActivity
        run: |
          python3 << 'PYEOF2'
          import re, os
          path = "android/app/src/main/java/com/mcqexam/app/MainActivity.java"
          if not os.path.exists(path):
            print("MainActivity not found yet — will patch after cap add android")
            exit(0)
          with open(path) as f:
            code = f.read()
          if "CapacitorSQLite" not in code:
            code = code.replace(
              "import com.getcapacitor.BridgeActivity;",
              "import com.getcapacitor.BridgeActivity;\nimport com.getcapacitor.community.database.sqlite.CapacitorSQLite;"
            )
            code = re.sub(
              r'(public class MainActivity extends BridgeActivity \{)',
              r'\1\n  @Override\n  public void onCreate(Bundle savedInstanceState) {\n    registerPlugin(CapacitorSQLite.class);\n    super.onCreate(savedInstanceState);\n  }',
              code
            )
            with open(path, "w") as f:
              f.write(code)
            print("MainActivity patched with SQLite plugin")
          PYEOF2

      - name: Init & add Android platform
        run: |
          npx cap add android || true
          npx cap sync android
      - name: Register SQLite plugin in MainActivity (post cap add)
        run: |
          python3 << 'PYEOF3'
          import re, glob
          matches = glob.glob("android/app/src/main/java/**/MainActivity.java", recursive=True)
          if not matches:
            print("MainActivity not found")
            exit(0)
          path = matches[0]
          with open(path) as f:
            code = f.read()
          if "CapacitorSQLite" in code:
            print("Already patched")
            exit(0)
          # Add import
          code = code.replace(
            "import com.getcapacitor.BridgeActivity;",
            "import android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\nimport com.getcapacitor.community.database.sqlite.CapacitorSQLite;"
          )
          # Register plugin in onCreate
          if "registerPlugin" not in code:
            code = re.sub(
              r'(public class MainActivity extends BridgeActivity\s*\{)',
              r'\1\n  @Override\n  public void onCreate(Bundle savedInstanceState) {\n    registerPlugin(CapacitorSQLite.class);\n    super.onCreate(savedInstanceState);\n  }',
              code
            )
          with open(path, "w") as f:
            f.write(code)
          print("Patched:", path)
          print(open(path).read())
          PYEOF3

      - name: Write network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
                <certificates src="user" />
              </trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">generativelanguage.googleapis.com</domain>
              <domain includeSubdomains="true">api.groq.com</domain>
            </domain-config>
          </network-security-config>
          EOF
      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f:
              content = f.read()
          if "INTERNET" not in content:
              content = content.replace(
                  "<application",
                  '<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <application',
                  1
              )
          if "networkSecurityConfig" not in content:
              content = content.replace(
                  "<application",
                  '<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"',
                  1
              )
          with open(path, "w") as f:
              f.write(content)
          print("Manifest patched!")
          print(open(path).read())
          PYEOF
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MCQ-Exam-Simulator
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
