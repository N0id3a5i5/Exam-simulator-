name: CI / CD — Build & APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:

# =============================================================================
# JOB 1 — Build Web (Vite)
# =============================================================================
  build-web:
    name: Build Web (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # ── FIX: removed cache: 'npm' — causes failure when package-lock.json
          # is missing or out of sync. Safe to remove; install is fast enough.

      - name: Install dependencies
        # ── FIX: use 'npm install' instead of 'npm ci'
        # 'npm ci' requires a perfect package-lock.json — fails if it's missing
        # or not committed. 'npm install' always works.
        run: npm install

      - name: Build
        # ── API keys are entered in the app by the user at runtime, not here.
        # No VITE_* env vars needed in the workflow at all.
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "dist/ not found — build failed"
            exit 1
          fi
          echo "Build OK — $(find dist -type f | wc -l) files"
          ls -lh dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

# =============================================================================
# JOB 2 — Build Android Debug APK
# =============================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: |
          sdkmanager \
            "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" \
            "platform-tools" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Install npm dependencies
        run: npm install

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist/

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate and rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "Found: $APK"
          cp "$APK" "mcq-exam-${{ github.ref_name }}-${{ github.sha }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: mcq-exam-*.apk
          retention-days: 30
          if-no-files-found: error

# =============================================================================
# JOB 3 — Create GitHub Release (only on version tags like v1.0.0)
# =============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-web, build-android]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: apk/

      - name: Zip web dist
        run: zip -r web-dist-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MCQ Exam Simulator ${{ github.ref_name }}"
          body: |
            ## Release ${{ github.ref_name }}

            ### Downloads
            | File | Description |
            |------|-------------|
            | `mcq-exam-*.apk` | Android APK — install directly on device |
            | `web-dist-*.zip` | Web build — host anywhere |

            ### Install APK on Android
            1. Download `mcq-exam-*.apk` below
            2. On your device: **Settings → Security → Install unknown apps → Allow**
            3. Open the downloaded file and tap Install

            ---
            Commit: `${{ github.sha }}`
          files: |
            apk/*.apk
            web-dist-*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
